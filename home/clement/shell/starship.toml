[os]
disabled = false

[username]
show_always = true
format = "[$user]($style)"

[status]
disabled = false
symbol = "[x](bold red)"

[character]
success_symbol = "[>](purple)"
error_symbol = "[X](red)"
vimcmd_symbol = "[<](green)"

[cmd_duration]
format = "[$duration]($style)"

[git_metrics]
disabled = false
format = "(\\[( [+$added]($added_style)) ([-$deleted]($deleted_style) )\\] )"

[git_commit]
disabled = false
tag_disabled = false
tag_symbol = ' '

[git_status]
disabled = false
format = '([$all_status$ahead_behind]($style) )'
style = 'bold yellow'
stashed = ''
modified = ''
deleted = ''
renamed = ''

[direnv]
disabled = false

[custom.zmx]
command = "echo $ZMX_SESSION"
when = '[ -n "$ZMX_SESSION" ]'
symbol = "¾▒é¼ "
style = "cyan bold"
format = "[$symbol$output ]($style)"
